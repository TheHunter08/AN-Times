<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0B0F17">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="format-detection" content="telephone=no,date=no,email=no,address=no">
  <title>TIMES INC</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;background:#0B0F17;min-height:100dvh;overflow:hidden}
    #root{position:fixed;inset:0;display:flex;flex-direction:column}
    .app-splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0B0F17;z-index:9999}
    .app-splash svg{width:52px;height:52px;animation:splashPulse 1.2s ease-in-out infinite}
    @keyframes splashPulse{0%,100%{opacity:.4;transform:scale(.95)}50%{opacity:1;transform:scale(1)}}
  </style>
</head>
<body>
  <div id="root">
    <div class="app-splash">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="44" y2="44">
            <stop offset="0%" stop-color="#c026d3"/>
            <stop offset="40%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <rect width="44" height="44" rx="10" fill="url(#lg)"/>
        <rect x="10" y="10" width="24" height="7" rx="2.5" fill="white"/>
        <rect x="18.5" y="10" width="7" height="28" rx="2.5" fill="white"/>
      </svg>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
