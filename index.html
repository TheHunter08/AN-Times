<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content" />
  <meta name="color-scheme" content="dark" />
  <meta name="format-detection" content="telephone=no,date=no,email=no,address=no" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0F172A" />
  <title>TIMES INC</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #0F172A; position: fixed; inset: 0; }
    #root { position: fixed; inset: 0; }
    #splash {
      position: fixed; inset: 0; background: #0F172A;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 9999;
    }
    #splash svg { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.6;transform:scale(.96)} 50%{opacity:1;transform:scale(1)} }
  </style>
</head>
<body>
  <div id="splash">
    <svg width="52" height="52" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg" x1="0" y1="0" x2="44" y2="44">
          <stop offset="0%" stop-color="#7C5CFF"/>
          <stop offset="55%" stop-color="#5E6AD2"/>
          <stop offset="100%" stop-color="#3B4BD6"/>
        </linearGradient>
        <linearGradient id="lgAcc" x1="0" y1="0" x2="44" y2="44">
          <stop offset="0%" stop-color="#7DF9FF"/>
          <stop offset="100%" stop-color="#00D2FF"/>
        </linearGradient>
      </defs>
      <rect width="44" height="44" rx="10" fill="url(#lg)"/>
      <rect x="11.5" y="14.5" width="21" height="4.4" rx="2.2" fill="white"/>
      <rect x="19.8" y="14.5" width="4.4" height="15.5" rx="2.2" fill="white"/>
      <path d="M 30 19.8 A 7.2 7.2 0 1 1 26.8 27" fill="none" stroke="url(#lgAcc)" stroke-width="2" stroke-linecap="round"/>
      <circle cx="30" cy="19.8" r="1.1" fill="url(#lgAcc)"/>
    </svg>
    <div style="font-family:system-ui,sans-serif;font-size:13px;color:#6A7F96;letter-spacing:.05em">TIMES INC</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
