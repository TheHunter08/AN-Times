<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="50%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="tgrad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tshadow">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="incgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <!-- Subtle grid overlay -->
  <rect width="1024" height="1024" rx="220" fill="rgba(255,255,255,0.03)"/>
  <!-- Ring arc (like original logo) -->
  <circle cx="450" cy="500" r="360" fill="none" stroke="url(#ring1)" stroke-width="28" stroke-linecap="round" stroke-dasharray="1350 910" stroke-dashoffset="-680" filter="url(#glow)"/>
  <!-- Second partial ring (cyan, right side) -->
  <circle cx="450" cy="500" r="340" fill="none" stroke="#38bdf8" stroke-width="14" stroke-linecap="round" stroke-dasharray="320 1820" stroke-dashoffset="-1260" opacity="0.7" filter="url(#glow)"/>
  <!-- BIG T letter -->
  <g filter="url(#tshadow)">
    <!-- T crossbar -->
    <rect x="120" y="200" width="600" height="140" rx="55" fill="url(#tgrad)"/>
    <!-- T stem -->
    <rect x="345" y="200" width="170" height="640" rx="55" fill="url(#tgrad)"/>
  </g>
  <!-- TIMES text -->
  <text x="560" y="610" font-family="'Arial Black','Arial',sans-serif" font-size="120" font-weight="900" fill="url(#textgrad)" letter-spacing="4" filter="url(#glow)">TIMES</text>
  <!-- INC text with gradient -->
  <text x="560" y="730" font-family="'Arial Black','Arial',sans-serif" font-size="130" font-weight="900" fill="url(#incgrad)" letter-spacing="6" filter="url(#glow)">INC</text>
  <!-- Underline stroke -->
  <path d="M 560 752 Q 700 775 870 748" stroke="url(#incgrad)" stroke-width="22" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.85"/>
</svg>