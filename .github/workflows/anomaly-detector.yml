name: Anomaly Detector – Jornadas sin cerrar

on:
  schedule:
    # ~23:00-24:00 Madrid. Antes había dos entradas (21h/22h UTC) pensadas para
    # invierno/verano, pero cron no distingue estaciones — las dos se ejecutaban
    # SIEMPRE, duplicando la descarga completa de app_data cada noche sin razón.
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install web-push --no-save
      - name: Detectar jornadas abiertas
        run: node anomaly-detector.js
        env:
          VAPID_PUBLIC:  ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VITE_SB_URL:   ${{ secrets.VITE_SB_URL }}
          VITE_SB_ANON:  ${{ secrets.VITE_SB_ANON }}
