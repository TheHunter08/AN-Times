name: Auto-cierre jornadas >10h

on:
  schedule:
    # Cada 4 horas entre las 06:00 y las 22:00 UTC (L-D)
    - cron: '0 6,10,14,18,22 * * *'
  workflow_dispatch:

jobs:
  autoclose:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install web-push --no-save
      - name: Cerrar jornadas abiertas >12h
        run: node push-autoclose-jornada.js
        env:
          VAPID_PUBLIC:  ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VITE_SB_URL:   ${{ secrets.VITE_SB_URL }}
          VITE_SB_ANON:  ${{ secrets.VITE_SB_ANON }}
