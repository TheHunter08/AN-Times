name: Despertar sincronización offline

on:
  schedule:
    # Evita el minuto 0, donde GitHub advierte de más retrasos de carga.
    - cron: '3,8,13,18,23,28,33,38,43,48,53,58 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: times-inc-sync-ping
  cancel-in-progress: true

jobs:
  wake-service-workers:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Obtener identidad OIDC de GitHub
        id: oidc
        shell: bash
        run: |
          response="$(curl --fail --silent --show-error \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=times-inc-sync")"
          token="$(printf '%s' "$response" | jq -r '.value')"
          test -n "$token" && test "$token" != "null"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Despertar dispositivos con cambios pendientes
        shell: bash
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          curl --fail --silent --show-error \
            --retry 2 --retry-all-errors --max-time 50 \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            https://times-inc.vercel.app/api/sync-ping
