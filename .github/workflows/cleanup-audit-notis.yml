name: Limpieza mensual de audit y notis

on:
  schedule:
    # El 1º de cada mes a las 04:00 UTC
    - cron: '0 4 1 * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Borrar audit y notis antiguos
        env:
          VITE_SB_URL: ${{ secrets.VITE_SB_URL }}
          VITE_SB_ANON: ${{ secrets.VITE_SB_ANON }}
        run: node cleanup-audit-notis.js
