name: Daily Supabase Backup

on:
  schedule:
    # Every day at 02:00 UTC (03:00 Madrid, 04:00 in summer)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VITE_SB_URL:  ${{ secrets.VITE_SB_URL }}
      VITE_SB_ANON: ${{ secrets.VITE_SB_ANON }}

    steps:
      - name: Download app_data snapshot
        run: |
          SB_URL="${VITE_SB_URL:?VITE_SB_URL secret is required}"
          SB_ANON="${VITE_SB_ANON:?VITE_SB_ANON secret is required}"
          # Strip BOM, carriage return, newline and spaces (handles copy-paste artefacts in secrets)
          SB_URL=$(printf '%s' "$SB_URL" | tr -d $'\r\n\t ' | sed 's/^\xef\xbb\xbf//')
          SB_ANON=$(printf '%s' "$SB_ANON" | tr -d $'\r\n\t ' | sed 's/^\xef\xbb\xbf//')
          DATE=$(date +%Y-%m-%d)

          echo "Backing up app_data..."
          curl -sf \
            -H "apikey: $SB_ANON" \
            -H "Authorization: Bearer $SB_ANON" \
            "$SB_URL/rest/v1/app_data?id=eq.1&select=*" \
            -o "backup_app_data_${DATE}.json"

          echo "Backing up push_subs..."
          curl -sf \
            -H "apikey: $SB_ANON" \
            -H "Authorization: Bearer $SB_ANON" \
            "$SB_URL/rest/v1/push_subs?select=user_id,updated_at" \
            -o "backup_push_subs_${DATE}.json"

          echo "Backup size: $(du -sh backup_app_data_${DATE}.json)"
          echo "backup_date=$DATE" >> $GITHUB_OUTPUT
        id: backup

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ steps.backup.outputs.backup_date }}
          path: backup_*.json
          retention-days: 30

      - name: Validate backup
        run: |
          DATE=$(date +%Y-%m-%d)
          SIZE=$(stat -c%s "backup_app_data_${DATE}.json" 2>/dev/null || echo 0)
          if [ "$SIZE" -lt 50 ]; then
            echo "ERROR: Backup file too small ($SIZE bytes). Data may be missing."
            exit 1
          fi
          echo "Backup OK: ${SIZE} bytes"

      - name: Keepalive write — evita pausa Supabase Free
        run: |
          SB_URL="${VITE_SB_URL:?VITE_SB_URL secret is required}"
          SB_ANON="${VITE_SB_ANON:?VITE_SB_ANON secret is required}"
          SB_URL=$(printf '%s' "$SB_URL" | tr -d $'\r\n\t ' | sed 's/^\xef\xbb\xbf//')
          SB_ANON=$(printf '%s' "$SB_ANON" | tr -d $'\r\n\t ' | sed 's/^\xef\xbb\xbf//')
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -X PATCH \
            -H "apikey: $SB_ANON" \
            -H "Authorization: Bearer $SB_ANON" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            "$SB_URL/rest/v1/app_data?id=eq.1" \
            -d "{\"updated_at\": \"$TS\"}")
          echo "Keepalive PATCH: $STATUS"
