name: Recordatorio Fichar

on:
  schedule:
    # Cada hora de 05:00 a 12:00 UTC (07:00–14:00 Madrid verano)
    # La hora exacta de envío se configura en el panel de Ajustes → Recordatorios
    - cron: '0 5-12 * * 1-5'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Llamar cron recordatorios
        run: |
          APP_URL="${VERCEL_APP_URL:-https://an-times.vercel.app}"
          APP_URL="${APP_URL// /}"
          echo "Llamando a: $APP_URL/api/cron-reminders"
          STATUS=$(curl -s -o /tmp/cron_resp.txt -w "%{http_code}" \
            -X GET "$APP_URL/api/cron-reminders" \
            -H "Authorization: Bearer $CRON_SECRET")
          echo "Status: $STATUS"
          echo "Response: $(cat /tmp/cron_resp.txt)"
          if [ "$STATUS" != "200" ]; then
            echo "Error: cron returned $STATUS"
            exit 1
          fi
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET:    ${{ secrets.CRON_SECRET }}
