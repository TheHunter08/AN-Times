name: Resumen Semanal

on:
  schedule:
    # Cada 30 min de 07:00 a 20:00 UTC los viernes
    # La hora exacta se configura en el panel de Ajustes → Recordatorios → Resumen semanal
    - cron: '0,30 7-20 * * 5'
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install web-push --no-save
      - name: Resumen semanal de horas
        run: node push-weekly-summary.js
        env:
          VAPID_PUBLIC:  ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          VITE_SB_URL:   ${{ secrets.VITE_SB_URL }}
          VITE_SB_ANON:  ${{ secrets.VITE_SB_ANON }}
