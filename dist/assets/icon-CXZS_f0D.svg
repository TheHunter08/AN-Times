<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C5CFF"/>
      <stop offset="55%" stop-color="#5E6AD2"/>
      <stop offset="100%" stop-color="#3B4BD6"/>
    </linearGradient>
    <linearGradient id="mark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E4E9FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DF9FF"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Abstract "T" / clock-tick monogram -->
  <g>
    <!-- T crossbar -->
    <rect x="262" y="332" width="500" height="104" rx="52" fill="url(#mark)"/>
    <!-- T stem -->
    <rect x="460" y="332" width="104" height="360" rx="52" fill="url(#mark)"/>
    <!-- Time accent: arc + tick representing punctuality -->
    <path d="M 700 462 A 168 168 0 1 1 624 642" fill="none" stroke="url(#accent)" stroke-width="44" stroke-linecap="round"/>
    <circle cx="700" cy="462" r="26" fill="url(#accent)"/>
  </g>
</svg>
